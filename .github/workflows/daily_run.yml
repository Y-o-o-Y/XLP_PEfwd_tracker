name: Daily SOX Data Fetcher

on:
  schedule:
    # 填入 cron 定時排程（使用 UTC 時間）
    # 範例：'0 21 * * 1-5' 代表美東時間週一至週五晚上 5 點
    - cron: '0 21 * * 1-5'
  workflow_dispatch: # 保留這個按鈕，讓你想手動測試時隨時可以點擊執行

jobs:
  run-spider:
    runs-on: ubuntu-latest
    
    # 賦予 GitHub Actions 把更新後的資料庫推回 Repo 的權限
    permissions:
      contents: write

    steps:
    - name: 檢查並拉取 Repo 代碼
      uses: actions/checkout@v4

    - name: 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 安裝必要第三方套件
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: 執行 Python 抓取腳本
      env:
        FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }} # 注入保險箱裡的 API Key
      run: python PEfwd_toGit.py

    - name: 將更新後的 SQLite 資料庫推回 GitHub
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add sox_history.db
        # 只有在資料庫真的有變動時才 commit，避免報錯
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: $(date +'%Y-%m-%d')" && git push)
